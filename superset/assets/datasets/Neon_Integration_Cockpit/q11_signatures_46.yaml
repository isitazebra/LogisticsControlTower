sql: "\n        SELECT reason_category, error_code, stage, partner,\n          count(*)\
  \ AS occurrences, min(event_time) AS onset, max(event_time) AS latest,\n       \
  \   count(DISTINCT business_ref) AS refs, sum(value_usd) AS value_exposed\n    \
  \    FROM txn_events WHERE status IN ('failed','rejected') AND reason_category IS\
  \ NOT NULL\n        GROUP BY 1,2,3,4 ORDER BY occurrences DESC"
