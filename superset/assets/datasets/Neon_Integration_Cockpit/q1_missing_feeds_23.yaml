catalog: neondb
schema: public
sql: "\n        SELECT partner, doc_type, channel, environment, expected_next_at,\
  \ last_seen_at,\n               round(extract(epoch FROM (now()-expected_next_at))/60)\
  \ AS mins_overdue\n        FROM expected_feeds\n        WHERE now() > expected_next_at\
  \ + make_interval(mins => grace_minutes)\n          AND (last_seen_at IS NULL OR\
  \ last_seen_at < expected_next_at)"
