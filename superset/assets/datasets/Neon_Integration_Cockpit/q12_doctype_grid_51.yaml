catalog: neondb
schema: public
sql: "\n        SELECT coalesce(c.business_family,'Other') AS family,\n          \
  \     coalesce(c.label, r.doc_type) AS doc_label, r.doc_type,\n               sum(r.txn_count)\
  \ AS txns, sum(r.failed_count) AS failed,\n               sum(r.rejected_count)\
  \ AS rejected, sum(r.duplicate_count) AS dupes,\n               sum(r.value_sum)\
  \ AS value_usd,\n               round(100.0*(1-sum(r.failed_count+r.rejected_count)::numeric/nullif(sum(r.txn_count),0)),1)\
  \ AS ok_pct\n        FROM txn_rollup_hourly r LEFT JOIN doc_type_catalog c USING\
  \ (doc_type)\n        GROUP BY 1,2,3"
