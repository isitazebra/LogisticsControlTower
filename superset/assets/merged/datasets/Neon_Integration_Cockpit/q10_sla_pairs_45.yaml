table_name: q10_sla_pairs
main_dttm_col: trigger_at
currency_code_column: null
description: null
default_endpoint: null
offset: 0
cache_timeout: 120
catalog: neondb
schema: public
sql: "\n        SELECT r.rule_id, r.name, t.partner, t.business_ref, t.event_time\
  \ AS trigger_at,\n          resp.event_time AS response_at,\n          round(extract(epoch\
  \ FROM (resp.event_time - t.event_time))/60) AS elapsed_min,\n          r.threshold_minutes,\n\
  \          CASE\n            WHEN resp.event_time IS NOT NULL\n                \
  \ AND extract(epoch FROM (resp.event_time-t.event_time))/60 <= r.threshold_minutes\
  \ THEN 'met'\n            WHEN resp.event_time IS NOT NULL THEN 'missed'\n     \
  \       WHEN now()-t.event_time > make_interval(mins=>r.threshold_minutes)     \
  \       THEN 'missed'\n            WHEN now()-t.event_time > make_interval(mins=>(r.threshold_minutes*0.8)::int)\
  \ THEN 'at_risk'\n            ELSE 'pending' END AS sla_state\n        FROM sla_rules\
  \ r\n        JOIN txn_events t ON t.doc_type=r.trigger_doc_type AND t.direction=r.trigger_direction\n\
  \          AND (r.partner IS NULL OR t.partner=r.partner) AND t.environment=r.environment\n\
  \        LEFT JOIN LATERAL (\n          SELECT event_time FROM txn_events x\n  \
  \        WHERE x.doc_type=r.response_doc_type AND x.direction=r.response_direction\n\
  \            AND x.business_ref=t.business_ref AND x.event_time >= t.event_time\n\
  \          ORDER BY x.event_time LIMIT 1) resp ON true\n        WHERE r.trigger_doc_type\
  \ IS NOT NULL AND t.business_ref LIKE 'LOAD%'"
