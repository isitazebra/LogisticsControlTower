schema: public
sql: "\n        WITH cur AS (SELECT partner, sum(txn_count) v, sum(failed_count+rejected_count)\
  \ e\n                     FROM txn_rollup_hourly WHERE bucket >= now()-interval\
  \ '7 days' GROUP BY partner),\n             prv AS (SELECT partner, sum(txn_count)\
  \ v FROM txn_rollup_hourly\n                     WHERE bucket >= now()-interval\
  \ '14 days' AND bucket < now()-interval '7 days' GROUP BY partner)\n        SELECT\
  \ cur.partner, cur.v AS volume, cur.e AS exceptions,\n               round(100.0*(cur.v-prv.v)/nullif(prv.v,0))\
  \ AS pct_change\n        FROM cur LEFT JOIN prv USING (partner) ORDER BY cur.v DESC"
