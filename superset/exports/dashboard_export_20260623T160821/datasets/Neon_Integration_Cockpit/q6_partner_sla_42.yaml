schema: public
sql: "\n        SELECT c.partner,\n          count(*) AS total,\n          count(*)\
  \ FILTER (WHERE terminal_at <= sla_due_at) AS met,\n          count(*) FILTER (WHERE\
  \ terminal_at > sla_due_at OR (terminal_at IS NULL AND now()>sla_due_at)) AS missed,\n\
  \          round(100.0*count(*) FILTER (WHERE terminal_at <= sla_due_at)/nullif(count(*),0),1)\
  \ AS pct_met,\n          round(avg(extract(epoch FROM (terminal_at-first_event_at))/60))\
  \ AS avg_min,\n          round(max(extract(epoch FROM (terminal_at-first_event_at))/60))\
  \ AS max_min,\n          coalesce(sum(p.penalty_usd) FILTER (WHERE terminal_at >\
  \ sla_due_at),0) AS penalty_usd\n        FROM txn_current c LEFT JOIN partner_penalty\
  \ p ON p.partner=c.partner\n        GROUP BY c.partner"
