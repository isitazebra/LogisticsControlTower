catalog: neondb
schema: public
sql: "\n        SELECT o.business_ref, o.partner, o.doc_type, o.event_time AS sent_at,\n\
  \               a.event_time AS ack_at, a.status AS ack_status,\n              \
  \ CASE WHEN a.event_time IS NULL AND now() > o.sla_due_at THEN 'missing'\n     \
  \               WHEN a.status='rejected' THEN 'rejected'\n                    WHEN\
  \ a.event_time IS NOT NULL THEN 'received'\n                    ELSE 'pending' END\
  \ AS fa_state\n        FROM txn_events o\n        LEFT JOIN txn_events a\n     \
  \     ON a.control_number=o.control_number AND a.doc_type IN ('997','CONTRL') AND\
  \ a.partner=o.partner\n        WHERE o.direction='out' AND o.doc_type NOT IN ('997','CONTRL')\n\
  \          AND o.business_ref LIKE 'ACK-%'"
