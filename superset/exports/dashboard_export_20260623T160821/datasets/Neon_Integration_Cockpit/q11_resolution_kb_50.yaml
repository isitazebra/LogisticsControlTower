catalog: neondb
schema: public
sql: "\n        SELECT e.event_time, e.business_ref, e.partner, e.reason_category,\
  \ e.error_code,\n               coalesce(dp.likely_cause, dg.likely_cause)     \
  \    AS likely_cause,\n               coalesce(dp.suggested_action, dg.suggested_action)\
  \ AS suggested_action,\n               coalesce(dp.runbook_url, dg.runbook_url)\
  \           AS runbook_url\n        FROM txn_events e\n        LEFT JOIN diagnostic_rules\
  \ dp ON dp.partner=e.partner\n          AND dp.reason_category=e.reason_category\
  \ AND dp.error_code=e.error_code\n        LEFT JOIN diagnostic_rules dg ON dg.partner\
  \ IS NULL\n          AND dg.reason_category=e.reason_category AND dg.error_code=e.error_code\n\
  \        WHERE e.status IN ('failed','rejected') AND e.reason_category IS NOT NULL"
