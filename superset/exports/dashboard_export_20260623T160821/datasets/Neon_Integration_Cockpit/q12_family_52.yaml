catalog: neondb
schema: public
sql: "\n        SELECT coalesce(c.business_family,'Other') AS family,\n          \
  \     count(DISTINCT r.doc_type) AS types, sum(r.txn_count) AS txns,\n         \
  \      sum(r.failed_count) AS failed, sum(r.rejected_count) AS rejected,\n     \
  \          sum(r.duplicate_count) AS dupes, sum(r.value_sum) AS value_usd\n    \
  \    FROM txn_rollup_hourly r LEFT JOIN doc_type_catalog c USING (doc_type)\n  \
  \      GROUP BY 1"
